<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A culinária brasileira | Cadastro</title>
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="styleCadastro.css">
    <link rel="icon" href="">
</head>

<body onload="listar()">

    <div class="header">
        <div class="container">
            <h1 class="titulo">A culinária brasileira</h1>

            <ul class="navbar">
                <li>
                    <a href="index.html">Inicial</a>
                </li>

                <li>
                    <a href="login.html">Login</a>
                </li>

                <li class="agora">
                    <a href="#">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="login">

        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

        <div class="container">
            <div class="card card-cadastro">

                <h2>Cadastre-se</h2>

                <div class="formulario">

                    <div class="campo">
                        <span>Código de ativação:</span>
                        <input id="codigo_input" type="text" placeholder="Insira aqui seu código">
                    </div>

                    <div class="campo">
                        <span>Nome:</span>
                        <input id="nome_input" type="text" placeholder="Seu nome">
                    </div>

                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="meuemail@provedor.com">
                    </div>

                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="Digite sua senha">
                    </div>

                    <div class="campo">
                        <span>Confirmação da senha:</span>
                        <input id="confirmacao_senha_input" type="password" placeholder="Confirme sua senha">
                    </div>

                    <button class="botao" onclick="cadastrar()">Cadastrar</button>

                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>

            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <h4>Projeto Individual </h4>
        </div>
    </div>

</body>

</html>

<script>
    let listaEmpresasCadastradas = [];

    function cadastrar() {
        var nomeVar = nome_input.value;
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        var confirmacaoSenhaVar = confirmacao_senha_input.value;
        var codigoVar = codigo_input.value;

        var idEmpresaVincular;

        if (
            nomeVar == "" ||
            emailVar == "" ||
            senhaVar == "" ||
            confirmacaoSenhaVar == "" ||
            codigoVar == ""
        ) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Preencha todos os campos antes de continuar.";
            finalizarAguardar();
            return false;
        }

        if (senhaVar != confirmacaoSenhaVar) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "As senhas não estão iguais.";
            finalizarAguardar();
            return false;
        }

        setInterval(sumirMensagem, 5000);

        for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
            if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
                idEmpresaVincular = listaEmpresasCadastradas[i].id;
                console.log("Código de ativação válido.");
                break;
            }
        }

        if (idEmpresaVincular == undefined) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Código de ativação inválido.";
            finalizarAguardar();
            return false;
        }

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                emailServer: emailVar,
                senhaServer: senhaVar,
                idEmpresaVincularServer: idEmpresaVincular
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    cardErro.style.display = "block";
                    mensagem_erro.innerHTML = "Cadastro realizado com sucesso! Redirecionando para o login...";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, 2000);

                    limparFormulario();
                    finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro.";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;
    }

    function listar() {
        fetch("/empresas/listar", {
            method: "GET",
        })
            .then(function (resposta) {
                resposta.json().then((empresas) => {
                    empresas.forEach((empresa) => {
                        listaEmpresasCadastradas.push(empresa);
                    });

                    console.log("Empresas cadastradas:");
                    console.log(listaEmpresasCadastradas);
                });
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
