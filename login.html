<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A culinária brasileira | Login</title>
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="styleLogin.css">
    <link rel="icon" href="">
</head>
<body>

    <div class="header">
        <div class="container">
            <h1 class="titulo">A culinária brasileira</h1>

            <ul class="navbar">
                <li>
                    <a href="home.html">Home</a>
                </li>

                <li class="agora">
                    <a href="#">Login</a>
                </li>

                <li>
                    <a href="cadastro.html">Cadastro</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="login">

        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

        <div class="container">
            <div class="card card-login">

                <h2>Entrar</h2>

                <p class="subtitulo-login">
                    Acesse sua conta e continue explorando os sabores do Brasil.
                </p>

                <div class="formulario">

                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Digite seu e-mail">
                    </div>

                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="Digite sua senha">
                    </div>

                    <button class="botao" onclick="entrar()">Entrar</button>

                    <p class="texto-cadastro">
                        Ainda não tem uma conta?
                        <a href="cadastro.html">Cadastre-se</a>
                    </p>

                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>

            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <h4>Projeto Individual - 2026 | Desenvolvido por Alexandre</h4>
        </div>
    </div>

</body>

</html>

<script>
    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Preencha todos os campos antes de continuar.";

            finalizarAguardar();

            return false;
        } else {
            setInterval(sumirMensagem, 5000);
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!");

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));

                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios);

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000);
                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
